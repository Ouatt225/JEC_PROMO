{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYGEPE — Accès refusé</title>
  <link rel="stylesheet" href="{% static 'SYGEPE/css/style.css' %}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
  </style>
</head>
<body>
  <div style="text-align: center; max-width: 480px; padding: 40px;">
    <div style="font-size: 5rem; margin-bottom: 20px;">🚫</div>
    <h1 style="font-size: 2rem; font-weight: 800; color: var(--danger); margin-bottom: 12px;">Accès refusé</h1>
    <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 32px;">
      Vous n'avez pas les permissions nécessaires pour accéder à cette page.
      Seuls les utilisateurs ayant le rôle <strong>RH</strong> ou <strong>Admin</strong> peuvent effectuer cette action.
    </p>
    <div style="display: flex; gap: 12px; justify-content: center;">
      <a href="/dashboard/" class="btn btn-primary">🏠 Retour au tableau de bord</a>
      <a href="javascript:history.back()" class="btn btn-outline">← Retour</a>
    </div>
    <p style="margin-top: 24px; font-size: 0.78rem; color: var(--text-muted);">
      Connecté en tant que : <strong>{{ request.user.username }}</strong>
    </p>
  </div>
</body>
</html>
