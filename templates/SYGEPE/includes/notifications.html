{% load static %}
{# ── Système de notifications SYGEPE — inclus par base.html et base_employe.html ── #}

{# Container toasts + URL API en data-attribute (lue par notifications.js) #}
<div id="sygepe-notif-container"
     data-api-url="{% url 'sygepe:api_notifications_conges' %}"></div>

{# Cloche #}
<div class="notif-bell-wrap" id="notifBellWrap">
  <button class="notif-bell-btn" id="notifBellBtn" title="Notifications">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
         width="20" height="20">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
    <span class="notif-badge" id="notifBadge">0</span>
  </button>
  <div class="notif-dropdown" id="notifDropdown">
    <div class="notif-dropdown-header">
      <span>Notifications</span>
      <button id="notifClearAll">Tout effacer</button>
    </div>
    <div class="notif-dropdown-list" id="notifList">
      <div class="notif-empty">Aucune notification</div>
    </div>
  </div>
</div>
