{% comment %}
  Barre de filtres statut. Paramètres (via {% include ... with %}) :
  reset_url, action_url, action_label, module ('permissions' = option extra), statut_selectionne
{% endcomment %}
<div class="filter-bar">
  <form method="get" style="display: flex; gap: 12px; flex: 1; align-items: center; flex-wrap: wrap;">
    <select name="statut" class="form-control" style="width: auto; min-width: 160px;">
      <option value="">Tous les statuts</option>
      <option value="en_attente" {% if statut_selectionne == 'en_attente' %}selected{% endif %}>En attente</option>
      {% if module == 'permissions' %}
      <option value="valide_responsable" {% if statut_selectionne == 'valide_responsable' %}selected{% endif %}>Validé par responsable</option>
      {% endif %}
      <option value="approuve" {% if statut_selectionne == 'approuve' %}selected{% endif %}>Approuvé</option>
      <option value="refuse"   {% if statut_selectionne == 'refuse'   %}selected{% endif %}>Refusé</option>
    </select>
    <button type="submit" class="btn btn-primary">Filtrer</button>
    <a href="{{ reset_url }}" class="btn btn-outline">Réinitialiser</a>
  </form>
  <a href="{{ action_url }}" class="btn btn-primary">{{ action_label }}</a>
</div>
